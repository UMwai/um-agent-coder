name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/*.md'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install lint tools
        run: pip install ruff black isort

      - name: Lint with ruff
        run: ruff check src/

      - name: Check formatting with black
        run: black --check src/

      - name: Check import sorting with isort
        run: isort --check-only src/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint  # Only run tests if lint passes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy um-agent-daemon \
            --source . \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region us-central1 \
            --allow-unauthenticated \
            --min-instances 0 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --no-cpu-throttling \
            --set-env-vars "UM_DAEMON_DB_PATH=/app/data/daemon_tasks.db,UM_DAEMON_GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},UM_DAEMON_GEMINI_FIRESTORE_ENABLED=true,UM_DAEMON_WORLD_AGENT_ENABLED=true,UM_DAEMON_WORLD_AGENT_GITHUB_REPOS=UMwai/um-agent-coder,UMwai/um_ai-hedge-fund" \
            --update-secrets="/home/appuser/.gemini/oauth_creds.json=gemini-oauth-creds:latest" \
            --quiet
