# Cloud Build CI/CD configuration
# Trigger: push to main branch
steps:
  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/um-agent-daemon:$COMMIT_SHA', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/um-agent-daemon:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'um-agent-daemon'
      - '--image'
      - 'gcr.io/$PROJECT_ID/um-agent-daemon:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600'
      - '--no-cpu-throttling'

substitutions:
  _REGION: us-central1

images:
  - 'gcr.io/$PROJECT_ID/um-agent-daemon:$COMMIT_SHA'
